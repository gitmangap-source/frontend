<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="js/api.js"></script>
</head>
<body>

<div x-data="mangaDetail()" x-init="load()" class="max-w-4xl mx-auto p-8">

    <div class="flex justify-between items-start mb-6">
        <div>
            <h1 class="text-3xl font-bold" x-text="manga.title"></h1>
            <p class="text-gray-600 mt-2" x-text="manga.description"></p>
        </div>
        <div class="flex gap-3">
            <a :href="'chapter-create.html?manga_id=' + id" class="bg-green-600 text-white px-4 py-2 rounded">
                Nuevo Cap&iacute;tulo
            </a>
            <a href="dashboard.html" class="bg-gray-400 text-white px-4 py-2 rounded">Volver</a>
        </div>
    </div>

    <h2 class="text-2xl font-bold mb-4">Cap&iacute;tulos</h2>

    <div class="space-y-2">
        <template x-for="chapter in chapters" :key="chapter.id">
            <a :href="'reader.html?chapter_id=' + chapter.id"
               class="block border p-4 rounded hover:bg-gray-50">
                <span class="font-semibold" x-text="'Cap&iacute;tulo ' + chapter.number"></span>
                <span class="text-gray-500 ml-2" x-text="chapter.title"></span>
            </a>
        </template>
        <p x-show="!chapters.length" class="text-gray-500 py-10 text-center">
            Este manga no tiene cap&iacute;tulos todav&iacute;a.
        </p>
    </div>

</div>

<script>
function mangaDetail() {

    return {
        id: new URLSearchParams(location.search).get("id"),
        manga: {},
        chapters: [],

        async load() {
            try {
                this.manga = await api("/mangas/" + this.id);
                this.chapters = await api("/mangas/" + this.id + "/chapters");
            } catch(e) {
                alert(e.message);
            }
        }
    };
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
