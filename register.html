<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <script defer
        src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js">
    </script>

    <script src="js/api.js"></script>
</head>

<body class="bg-slate-100">

<div
    x-data="registerPage()"
    class="max-w-md mx-auto mt-20 bg-white p-6 rounded"
>

    <h1 class="text-3xl font-bold mb-5">Crear cuenta</h1>

    <input
        x-model="username"
        class="w-full border p-3 mb-3"
        placeholder="Username"
    >

    <input
        x-model="email"
        class="w-full border p-3 mb-3"
        placeholder="Email"
    >

    <input
        x-model="password"
        type="password"
        class="w-full border p-3 mb-3"
        placeholder="Password"
    >

    <button
        @click="register"
        class="w-full bg-green-600 text-white p-3"
    >
        Crear cuenta
    </button>

    <p class="mt-3 text-center">
        <a href="login.html" class="text-blue-600">Ya tengo cuenta</a>
    </p>

</div>

<script>
function registerPage() {
    return {

        username: "",
        email: "",
        password: "",

        async register() {

            try {

                await api(
                    "/auth/register",
                    {
                        method: "POST",
                        body: JSON.stringify({
                            username: this.username,
                            email: this.email,
                            password: this.password
                        })
                    }
                );

                location.href =
                    "login.html";

            } catch(e) {
                alert(e.message);
            }
        }
    };
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
