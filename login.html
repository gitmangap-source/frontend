<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <script defer
        src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js">
    </script>

    <script src="js/api.js"></script>
</head>

<body class="bg-slate-100">

<div
    x-data="loginPage()"
    class="max-w-md mx-auto mt-20 bg-white p-6 rounded shadow"
>

    <h1 class="text-3xl font-bold mb-5">
        MangaHub
    </h1>

    <input
        x-model="email"
        class="w-full border p-3 mb-3"
        placeholder="Email"
    >

    <input
        x-model="password"
        type="password"
        class="w-full border p-3 mb-3"
        placeholder="Contraseña"
    >

    <button
        @click="login"
        class="w-full bg-blue-600 text-white p-3 rounded"
    >
        Entrar
    </button>

    <p class="mt-3 text-center">
        <a href="register.html" class="text-blue-600">Registrarse</a>
    </p>

</div>

<script>
function loginPage() {
    return {

        email: "",
        password: "",

        async login() {
            if (!this.email || !this.password) { alert("Completa todos los campos"); return; }

            try {

                const result = await api(
                    "/auth/login",
                    {
                        method: "POST",
                        body: JSON.stringify({
                            email: this.email,
                            password: this.password
                        })
                    }
                );

                localStorage.setItem(
                    "token",
                    result.access_token
                );

                location.href =
                    "dashboard.html";

            } catch (e) {
                alert(e.message);
            }
        }
    };
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
