<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="js/api.js"></script>
</head>

<body>

<div
    x-data="createManga()"
    class="max-w-xl mx-auto mt-10"
>

    <h1 class="text-3xl font-bold mb-5">Crear Manga</h1>

    <input
        x-model="title"
        placeholder="Título"
        class="w-full border p-3 mb-3"
    >

    <textarea
        x-model="description"
        placeholder="Descripción"
        class="w-full border p-3 mb-3"
    ></textarea>

    <input
        x-model="cover_url"
        placeholder="URL de portada (opcional)"
        class="w-full border p-3 mb-3"
    >

    <div class="flex gap-3">
        <button
            @click="save"
            class="bg-blue-600 text-white p-3 rounded"
        >
            Crear
        </button>
        <a href="dashboard.html" class="bg-gray-400 text-white p-3 rounded">Cancelar</a>
    </div>

</div>

<script>
function createManga() {

    return {

        title: "",
        description: "",
        cover_url: "",

        async save() {
            try {
                const body = {
                    title: this.title,
                    description: this.description
                };
                if (this.cover_url.trim()) {
                    body.cover_url = this.cover_url.trim();
                }

                await api("/mangas", {
                    method: "POST",
                    body: JSON.stringify(body)
                });

                location.href = "dashboard.html";
            } catch(e) {
                alert(e.message);
            }
        }
    };
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
