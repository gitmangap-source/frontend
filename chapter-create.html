<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="js/api.js"></script>
</head>
<body>

<div x-data="createChapter()" class="max-w-2xl mx-auto mt-10 p-6">

    <h1 class="text-3xl font-bold mb-5">Nuevo Cap&iacute;tulo</h1>

    <input x-model="number" type="number" step="0.1" placeholder="N&uacute;mero"
           class="w-full border p-3 mb-3">

    <input x-model="title" placeholder="T&iacute;tulo (opcional)"
           class="w-full border p-3 mb-3">

    <h2 class="text-xl font-bold mb-3">P&aacute;ginas (URLs)</h2>

    <template x-for="(page, index) in pages" :key="index">
        <div class="flex gap-2 mb-2">
            <input x-model="pages[index]" :placeholder="'URL p&aacute;gina ' + (index + 1)"
                   class="flex-1 border p-2">
            <button @click="pages.splice(index, 1)" class="bg-red-500 text-white px-3 rounded">X</button>
        </div>
    </template>

    <button @click="pages.push('')" class="bg-gray-500 text-white px-4 py-2 rounded mb-5">
        + A&ntilde;adir p&aacute;gina
    </button>

    <div class="flex gap-3">
        <button @click="save" class="bg-green-600 text-white p-3 rounded">
            Guardar cap&iacute;tulo
        </button>
        <a :href="'manga-detail.html?id=' + mangaId" class="bg-gray-400 text-white p-3 rounded">Cancelar</a>
    </div>

</div>

<script>
function createChapter() {

    return {
        mangaId: new URLSearchParams(location.search).get("manga_id"),
        number: "",
        title: "",
        pages: [""],

        async save() {
            try {
                await api("/mangas/" + this.mangaId + "/chapters", {
                    method: "POST",
                    body: JSON.stringify({
                        number: parseFloat(this.number),
                        title: this.title,
                        pages: this.pages.filter(p => p.trim() !== "")
                    })
                });
                location.href = "manga-detail.html?id=" + this.mangaId;
            } catch(e) {
                alert(e.message);
            }
        }
    };
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
