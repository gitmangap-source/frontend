<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <script defer
        src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js">
    </script>

    <script src="js/api.js"></script>
</head>

<body>

<div
    x-data="dashboard()"
    x-init="load()"
    class="max-w-6xl mx-auto p-8"
>

    <div class="flex justify-between items-center mb-6">

        <h1 class="text-3xl font-bold">
            Mis Mangas
        </h1>

        <div class="flex gap-3">
            <a
                href="manga-create.html"
                class="bg-blue-600 text-white px-4 py-2 rounded"
            >
                Nuevo Manga
            </a>

            <button
                @click="logout"
                class="bg-red-500 text-white px-4 py-2 rounded"
            >
                Cerrar sesi&oacute;n
            </button>
        </div>

    </div>

    <div class="grid md:grid-cols-3 gap-4">

        <template
            x-for="manga in mangas"
            :key="manga.id"
        >

            <div
                @click="goToDetail(manga.id)"
                class="border p-4 rounded block hover:shadow-lg cursor-pointer"
            >

                <div class="flex justify-between items-start">
                    <div class="flex-1 min-w-0">
                        <h2
                            class="font-bold text-xl truncate"
                            x-text="manga.title"
                        ></h2>
                        <p
                            class="text-gray-600 mt-2 line-clamp-2"
                            x-text="manga.description || 'Sin descripci\u00f3n'"
                        ></p>
                    </div>
                    <button
                        @click.stop="deleteManga(manga.id)"
                        class="text-red-400 hover:text-red-600 p-2 rounded-full transition flex-shrink-0"
                    >
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </div>

            </div>

        </template>

        <p x-show="!mangas.length" class="text-gray-500 col-span-3 text-center py-10">
            No hay mangas todav&iacute;a. Crea uno!
        </p>

    </div>

</div>

<script>
function dashboard() {

    return {

        mangas: [],

        async load() {
            try {
                this.mangas =
                    await api("/mangas");
            } catch(e) {
                alert(e.message);
            }
        },

        goToDetail(id) {
            location.href = "manga-detail.html?id=" + id;
        },

        async deleteManga(id) {
            if (!confirm("\u00bfEliminar este manga permanentemente? Se perder\u00e1n todos sus cap\u00edtulos.")) return;
            try {
                await api("/mangas/" + id, { method: "DELETE" });
                this.mangas = this.mangas.filter(m => m.id !== id);
                alert("Manga eliminado");
            } catch(e) {
                alert(e.message);
            }
        },

        logout() {
            localStorage.removeItem("token");
            location.href = "login.html";
        }
    };
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
